<!DOCTYPE html>
<html>
<head>

<title>Daily Health Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">
📝 Daily Health Quiz
</h1>

<div id="quizContainer"></div>

<div id="resultCard" class="card shadow p-4 mt-4 text-center d-none">

    <h2 id="scoreText"></h2>

    <h4 id="badgeText"></h4>

    <p id="messageText"></p>

</div>

<button
class="btn btn-success mt-4"
onclick="submitQuiz()">

Submit Quiz

</button>

<h3 id="score"></h3>

</div>

<script src="js/questions.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
