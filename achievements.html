<!DOCTYPE html>
<html>
<head>
<title>Achievements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h1 class="text-center">🏆 Achievement Center</h1>

<!-- Badges ikada display avutayi -->
<div id="badges"></div>

</div>

<script>

// 👇 IKKADA SCRIPT PASTE CHEYYI

let completed =
parseInt(localStorage.getItem("completedChallenges")) || 0;

let badges = "";

if(completed >= 1)
badges += "<div class='card p-3 mb-3'>🥉 Beginner Badge</div>";

if(completed >= 5)
badges += "<div class='card p-3 mb-3'>🥈 Health Learner</div>";

if(completed >= 10)
badges += "<div class='card p-3 mb-3'>🥇 Health Expert</div>";

if(completed >= 20)
badges += "<div class='card p-3 mb-3'>💧 Hydration Hero</div>";

if(completed >= 30)
badges += "<div class='card p-3 mb-3'>🚶 Walking Champion</div>";

if(completed >= 50)
badges += "<div class='card p-3 mb-3'>👑 Health Legend</div>";

if(badges === ""){
    badges = `
    <div class="alert alert-info">
    No badges unlocked yet.
    </div>
    `;
}

document.getElementById("badges").innerHTML = badges;

</script>

</body>
</html>
