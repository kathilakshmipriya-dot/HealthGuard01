<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
📄 Health & Wellness Report
</h1>
<li>
<a href="report.html">
Reports
</a>
</li>

<div class="card shadow p-4">

<table class="table table-bordered">

<tr>
<th>Water Intake</th>
<td id="reportWater"></td>
</tr>

<tr>
<th>Sleep Hours</th>
<td id="reportSleep"></td>
</tr>

<tr>
<th>Calories</th>
<td id="reportCalories"></td>
</tr>

<tr>
<th>Steps</th>
<td id="reportSteps"></td>
</tr>

<tr>
<th>Hygiene Score</th>
<td id="reportHygiene"></td>
</tr>

<tr>
<th>Badge</th>
<td id="reportBadge"></td>
</tr>

<tr>
<th>Health Score</th>
<td id="reportHealthScore"></td>
</tr>

</table>

<button
class="btn btn-success"
onclick="window.print()">
Download / Print Report
</button>

</div>

</div>

<script src="js/report.js"></script>

</body>
</html>
