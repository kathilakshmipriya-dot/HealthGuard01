<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calorie Counter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
🔥 Calorie Counter
</h1>

<div class="card shadow p-4 mx-auto" style="max-width:600px;">

<div class="mb-3">
<label>Food Item</label>

<select
id="food"
class="form-select">

<option value="95">Apple (95 cal)</option>
<option value="105">Banana (105 cal)</option>
<option value="250">Rice Bowl (250 cal)</option>
<option value="300">Burger (300 cal)</option>
<option value="150">Milk (150 cal)</option>

</select>

</div>

<button
class="btn btn-success"
onclick="addCalories()">

Add Calories

</button>

<hr>

<h3 id="totalCalories">
Total Calories: 0
</h3>

<button
class="btn btn-danger mt-3"
onclick="resetCalories()">

Reset

</button>

</div>

</div>

<script src="js/calorie.js"></script>

</body>
</html>
