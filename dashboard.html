<div class="col-md-10 p-4">

<h2>Welcome Back 👋</h2>

<p>Your Health Summary</p>

<div class="row g-4 justify-content-center">

    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>Health Score</h5>
                <h2 id="healthScore">0%</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>BMI Status</h5>
                <h2 id="dashboardBMI">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>Weekly Average</h5>
                <h2 id="weeklyAverage">0%</h2>
            </div>
        </div>
    </div>

</div>
<script>
    let healthScore =
localStorage.getItem("healthScore") || 0;


document.getElementById("healthScore")
.innerText = healthScore + "%";

    let bmi = localStorage.getItem("bmi") || 0;
    document.getElementById("dashboardBMI").innerText = bmi;
console.log("BMI:", bmi);

let history =
JSON.parse(localStorage.getItem("healthHistory")) || [];

let total = 0;

for(let i=0; i<history.length; i++){
    total += history[i].score;
}

let average = 0;

if(history.length > 0){
    average = Math.round(total / history.length);
}

document.getElementById("weeklyAverage")
.innerText = average + "%";
console.log(document.getElementById("weeklyAverage"));

let today = new Date().toISOString().split("T")[0];

let lastDate =
localStorage.getItem("lastDate");

if(lastDate !== today){

    localStorage.setItem("water", 0);
    localStorage.setItem("sleepHours", 0);
    localStorage.setItem("steps", 0);
    localStorage.setItem("hygieneScore", 0);

    localStorage.setItem("lastDate", today);
}

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
